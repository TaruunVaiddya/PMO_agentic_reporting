kind = "web"
previewPath = "/"
title = "PMO Report Builder"
version = "1.0.0"
id = "artifacts/pmo-report-builder"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18901

[services.development]
run = "pnpm --filter @workspace/pmo-report-builder run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pmo-report-builder", "run", "build" ]
publicDir = "artifacts/pmo-report-builder/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18901"
BASE_PATH = "/"
